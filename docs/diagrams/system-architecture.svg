<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%" style="background-color: #0b0f19; font-family: 'Inter', system-ui, -apple-system, sans-serif;">
  <defs>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <linearGradient id="slateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Lines / Visual Grid -->
  <path d="M 0,75 L 800,75 M 0,150 L 800,150 M 0,225 L 800,225 M 0,300 L 800,300 M 0,375 L 800,375" stroke="#1e293b" stroke-width="1" />
  <path d="M 133,0 L 133,450 M 266,0 L 266,450 M 400,0 L 400,450 M 533,0 L 533,450 M 666,0 L 666,450" stroke="#1e293b" stroke-width="1" />

  <!-- Flow Connector Lines -->
  <path d="M 210,225 L 340,225" stroke="url(#glowGrad)" stroke-width="3" filter="url(#glow)" fill="none" />
  <path d="M 460,200 Q 560,150 630,150" stroke="#818cf8" stroke-width="2" stroke-dasharray="4 4" fill="none" />
  <path d="M 460,250 Q 560,300 630,300" stroke="#34d399" stroke-width="2" stroke-dasharray="4 4" fill="none" />

  <!-- Title -->
  <text x="30" y="45" fill="#f8fafc" font-size="20" font-weight="bold" letter-spacing="1">SYSTEM ARCHITECTURE</text>
  <text x="30" y="65" fill="#64748b" font-size="12">VoiceMail-Genie Full-Stack Routing &amp; Integrations</text>

  <!-- Client Layer Card -->
  <rect x="50" y="140" width="160" height="170" rx="12" fill="url(#slateGrad)" stroke="#334155" stroke-width="1.5" />
  <rect x="65" y="155" width="130" height="30" rx="6" fill="#0f172a" />
  <text x="130" y="174" fill="#38bdf8" font-size="12" font-weight="bold" text-anchor="middle">CLIENT TIER</text>
  <text x="75" y="215" fill="#e2e8f0" font-size="11" font-weight="600">• React 19 Frontend</text>
  <text x="75" y="240" fill="#e2e8f0" font-size="11" font-weight="600">• Tailwind CSS v4</text>
  <text x="75" y="265" fill="#e2e8f0" font-size="11" font-weight="600">• Web Recording API</text>
  <text x="75" y="290" fill="#e2e8f0" font-size="11" font-weight="600">• Firebase Client SDK</text>

  <!-- Backend API Gateway Card -->
  <rect x="340" y="140" width="160" height="170" rx="12" fill="url(#slateGrad)" stroke="#4f46e5" stroke-width="1.5" />
  <rect x="355" y="155" width="130" height="30" rx="6" fill="#0f172a" />
  <text x="420" y="174" fill="#818cf8" font-size="12" font-weight="bold" text-anchor="middle">BACKEND GATEWAY</text>
  <text x="365" y="215" fill="#e2e8f0" font-size="11" font-weight="600">• Express 4 Server</text>
  <text x="365" y="240" fill="#e2e8f0" font-size="11" font-weight="600">• NodeJS Runtime</text>
  <text x="365" y="265" fill="#e2e8f0" font-size="11" font-weight="600">• Key Protection Proxy</text>
  <text x="365" y="290" fill="#e2e8f0" font-size="11" font-weight="600">• RFC 822 Compiler</text>

  <!-- Gemini AI Cloud Card -->
  <rect x="630" y="80" width="140" height="110" rx="12" fill="url(#slateGrad)" stroke="#6366f1" stroke-width="1.5" />
  <rect x="642" y="95" width="116" height="24" rx="6" fill="#0f172a" />
  <text x="700" y="111" fill="#a5b4fc" font-size="10" font-weight="bold" text-anchor="middle">GOOGLE GEMINI AI</text>
  <text x="650" y="145" fill="#e2e8f0" font-size="10" font-weight="600">• gemini-3.5-flash</text>
  <text x="650" y="165" fill="#64748b" font-size="9">• Multimodal API</text>

  <!-- Firebase Auth Card -->
  <rect x="630" y="240" width="140" height="110" rx="12" fill="url(#slateGrad)" stroke="#10b981" stroke-width="1.5" />
  <rect x="642" y="255" width="116" height="24" rx="6" fill="#0f172a" />
  <text x="700" y="271" fill="#34d399" font-size="10" font-weight="bold" text-anchor="middle">FIREBASE SYSTEM</text>
  <text x="650" y="305" fill="#e2e8f0" font-size="10" font-weight="600">• Auth &amp; Users</text>
  <text x="650" y="325" fill="#64748b" font-size="9">• Cloud Datastore</text>
</svg>
