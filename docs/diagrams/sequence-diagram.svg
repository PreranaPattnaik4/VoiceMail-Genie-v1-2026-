<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%" style="background-color: #0b0f19; font-family: 'Inter', system-ui, -apple-system, sans-serif;">
  <text x="30" y="45" fill="#f8fafc" font-size="20" font-weight="bold" letter-spacing="1">API TRANSACTION SEQUENCE</text>
  <text x="30" y="65" fill="#64748b" font-size="12">Lifecycle Triggers &amp; Timing of Multi-Service API Handshakes</text>

  <!-- Lifelines -->
  <line x1="120" y1="120" x2="120" y2="400" stroke="#334155" stroke-width="1.5" stroke-dasharray="4 4" />
  <line x1="320" y1="120" x2="320" y2="400" stroke="#334155" stroke-width="1.5" stroke-dasharray="4 4" />
  <line x1="520" y1="120" x2="520" y2="400" stroke="#334155" stroke-width="1.5" stroke-dasharray="4 4" />
  <line x1="700" y1="120" x2="700" y2="400" stroke="#334155" stroke-width="1.5" stroke-dasharray="4 4" />

  <!-- Lifeline Headers -->
  <rect x="60" y="90" width="120" height="30" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1" />
  <text x="120" y="110" fill="#f8fafc" font-size="11" font-weight="bold" text-anchor="middle">Client App</text>

  <rect x="260" y="90" width="120" height="30" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1" />
  <text x="320" y="110" fill="#f8fafc" font-size="11" font-weight="bold" text-anchor="middle">Express Server</text>

  <rect x="460" y="90" width="120" height="30" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1" />
  <text x="520" y="110" fill="#f8fafc" font-size="11" font-weight="bold" text-anchor="middle">Gemini AI</text>

  <rect x="640" y="90" width="120" height="30" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1" />
  <text x="700" y="110" fill="#f8fafc" font-size="11" font-weight="bold" text-anchor="middle">Gmail API</text>

  <!-- Execution Bars -->
  <rect x="115" y="150" width="10" height="230" fill="#3b82f6" rx="2" />
  <rect x="315" y="160" width="10" height="210" fill="#8b5cf6" rx="2" />
  <rect x="515" y="175" width="10" height="115" fill="#ec4899" rx="2" />
  <rect x="695" y="315" width="10" height="45" fill="#10b981" rx="2" />

  <!-- Message 1: Record & Upload -->
  <path d="M 125,165 L 315,165" stroke="#f1f5f9" stroke-width="1.5" fill="none" />
  <polygon points="310,161 315,165 310,169" fill="#f1f5f9" />
  <text x="220" y="155" fill="#94a3b8" font-size="10" text-anchor="middle">POST /api/transcribe (audio)</text>

  <!-- Message 2: Transcribe Request -->
  <path d="M 325,180 L 515,180" stroke="#a78bfa" stroke-width="1.5" fill="none" />
  <polygon points="510,176 515,180 510,184" fill="#a78bfa" />
  <text x="420" y="174" fill="#a78bfa" font-size="10" text-anchor="middle">generateContent()</text>

  <!-- Message 3: Transcribe Return -->
  <path d="M 515,215 L 325,215" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="3 3" fill="none" />
  <polygon points="330,211 325,215 330,219" fill="#a78bfa" />
  <text x="420" y="210" fill="#a78bfa" font-size="10" text-anchor="middle">JSON Text &amp; Language</text>

  <!-- Message 4: Write Draft -->
  <path d="M 325,240 L 515,240" stroke="#ec4899" stroke-width="1.5" fill="none" />
  <polygon points="510,236 515,240 510,244" fill="#ec4899" />
  <text x="420" y="234" fill="#ec4899" font-size="10" text-anchor="middle">Compose Email Prompt</text>

  <!-- Message 5: Write Return -->
  <path d="M 515,275 L 325,275" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="3 3" fill="none" />
  <polygon points="330,271 325,275 330,279" fill="#ec4899" />
  <text x="420" y="270" fill="#ec4899" font-size="10" text-anchor="middle">Formatted Email Block</text>

  <!-- Message 6: Display Draft -->
  <path d="M 315,295 L 125,295" stroke="#f1f5f9" stroke-width="1.5" stroke-dasharray="3 3" fill="none" />
  <polygon points="130,291 125,295 130,299" fill="#f1f5f9" />
  <text x="220" y="290" fill="#94a3b8" font-size="10" text-anchor="middle">Show compiled draft UI</text>

  <!-- Message 7: Sync to Gmail -->
  <path d="M 125,320 L 315,320" stroke="#f1f5f9" stroke-width="1.5" fill="none" />
  <polygon points="310,316 315,320 310,324" fill="#f1f5f9" />
  <text x="220" y="312" fill="#94a3b8" font-size="10" text-anchor="middle">Sync Request (OAuth)</text>

  <!-- Message 8: Create Draft In Gmail -->
  <path d="M 325,335 L 695,335" stroke="#10b981" stroke-width="1.5" fill="none" />
  <polygon points="690,331 695,335 690,339" fill="#10b981" />
  <text x="510" y="329" fill="#10b981" font-size="10" text-anchor="middle">POST /gmail/v1/users/me/drafts</text>

  <!-- Message 9: Confirm Sync -->
  <path d="M 695,355 L 325,355" stroke="#10b981" stroke-width="1.5" stroke-dasharray="3 3" fill="none" />
  <polygon points="330,351 325,355 330,359" fill="#10b981" />
  <text x="510" y="350" fill="#10b981" font-size="10" text-anchor="middle">Success Response</text>

  <!-- Message 10: Show Toast -->
  <path d="M 315,370 L 125,370" stroke="#f1f5f9" stroke-width="1.5" stroke-dasharray="3 3" fill="none" />
  <polygon points="130,366 125,370 130,374" fill="#f1f5f9" />
  <text x="220" y="365" fill="#94a3b8" font-size="10" text-anchor="middle">Render success toast banner</text>
</svg>
